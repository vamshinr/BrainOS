events {
    worker_connections 1024;
}

http {
    client_max_body_size 50M;

    upstream frontend {
        server frontend:3000;
    }

    upstream backend {
        server backend:8081;
    }

    # ── HTTP :80 ─────────────────────────────────────────────────────────────
    # Serves the ACME (Let's Encrypt) challenge path so cert renewals work
    # without taking nginx down. Everything else is redirected to HTTPS.
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS :443 ───────────────────────────────────────────────────────────
    # The cert files are auto-bootstrapped as a self-signed pair on first boot
    # (see the nginx `command:` in docker-compose.yml). Replace them with a
    # real Let's Encrypt cert by running deploy/gcp/init-tls.sh once a domain
    # is pointed at the VM.
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;

        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
