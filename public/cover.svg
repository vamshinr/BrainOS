<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" font-family="'JetBrains Mono','SF Mono','Menlo',ui-monospace,monospace">
  <defs>
    <radialGradient id="bgGlow" cx="68%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#1a3960" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#0a1322" stop-opacity="1"/>
      <stop offset="100%" stop-color="#04060d" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="bgBase" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#070a14"/>
      <stop offset="100%" stop-color="#02030a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5cf2ff"/>
      <stop offset="55%" stop-color="#7aa2ff"/>
      <stop offset="100%" stop-color="#c66bff"/>
    </linearGradient>
    <linearGradient id="amdRed" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff3b3b"/>
      <stop offset="100%" stop-color="#ff7a3b"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#1b2a45" stroke-width="0.5" opacity="0.55"/>
    </pattern>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bgBase)"/>
  <rect width="1920" height="1080" fill="url(#bgGlow)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>

  <!-- Subtle horizontal scan glow -->
  <rect x="0" y="540" width="1920" height="2" fill="#5cf2ff" opacity="0.06"/>

  <!-- Top corner brackets -->
  <g stroke="#5cf2ff" stroke-width="1.5" opacity="0.5" fill="none">
    <path d="M60 60 L60 110 M60 60 L110 60"/>
    <path d="M1860 60 L1810 60 M1860 60 L1860 110"/>
    <path d="M60 1020 L60 970 M60 1020 L110 1020"/>
    <path d="M1860 1020 L1810 1020 M1860 1020 L1860 970"/>
  </g>

  <!-- Top status bar -->
  <g font-size="14" letter-spacing="3" fill="#5cf2ff" opacity="0.75">
    <text x="80" y="92">SYS://BRAINOS · v0.1 · QWEN2.5-32B · BM25 + DENSE</text>
  </g>
  <g font-size="14" letter-spacing="3" fill="#7aa2ff" opacity="0.65" text-anchor="end">
    <text x="1840" y="92">VLLM · AMD MI300X · ONLINE</text>
  </g>
  <circle cx="1860" cy="87" r="4" fill="#22e07d">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Knowledge graph cluster (right two thirds) -->
  <g transform="translate(1180,540)">
    <!-- orbit rings -->
    <g fill="none" stroke="#5cf2ff" opacity="0.12">
      <circle r="220"/>
      <circle r="320"/>
      <circle r="430" stroke-dasharray="2,8"/>
    </g>

    <!-- edges -->
    <g stroke="url(#accent)" stroke-width="1.4" fill="none" opacity="0.85">
      <line x1="0" y1="0" x2="-180" y2="-110"/>
      <line x1="0" y1="0" x2="170" y2="-130"/>
      <line x1="0" y1="0" x2="200" y2="60"/>
      <line x1="0" y1="0" x2="-110" y2="180"/>
      <line x1="0" y1="0" x2="40" y2="-220"/>
      <line x1="0" y1="0" x2="-220" y2="20"/>
      <line x1="-180" y1="-110" x2="40" y2="-220"/>
      <line x1="170" y1="-130" x2="200" y2="60"/>
      <line x1="-110" y1="180" x2="-220" y2="20"/>
      <line x1="200" y1="60" x2="-110" y2="180"/>
      <line x1="-180" y1="-110" x2="-220" y2="20"/>
    </g>

    <!-- outer satellite edges -->
    <g stroke="#7aa2ff" stroke-width="1" fill="none" opacity="0.5">
      <line x1="40" y1="-220" x2="120" y2="-330"/>
      <line x1="170" y1="-130" x2="320" y2="-150"/>
      <line x1="200" y1="60" x2="380" y2="120"/>
      <line x1="-110" y1="180" x2="-180" y2="320"/>
      <line x1="-220" y1="20" x2="-380" y2="-30"/>
      <line x1="-180" y1="-110" x2="-320" y2="-220"/>
    </g>

    <!-- nodes -->
    <g filter="url(#softGlow)">
      <circle r="22" fill="#04060d" stroke="url(#accent)" stroke-width="2.5"/>
      <circle r="6" fill="#5cf2ff"/>
    </g>

    <g fill="#04060d" stroke="#5cf2ff" stroke-width="1.8">
      <circle cx="-180" cy="-110" r="14"/>
      <circle cx="170" cy="-130" r="14"/>
      <circle cx="200" cy="60" r="14"/>
      <circle cx="-110" cy="180" r="14"/>
      <circle cx="40" cy="-220" r="14"/>
      <circle cx="-220" cy="20" r="14"/>
    </g>
    <g fill="#5cf2ff">
      <circle cx="-180" cy="-110" r="4"/>
      <circle cx="170" cy="-130" r="4"/>
      <circle cx="200" cy="60" r="4"/>
      <circle cx="-110" cy="180" r="4"/>
      <circle cx="40" cy="-220" r="4"/>
      <circle cx="-220" cy="20" r="4"/>
    </g>

    <!-- outer satellite nodes (smaller, magenta accent) -->
    <g fill="#04060d" stroke="#c66bff" stroke-width="1.4">
      <circle cx="120" cy="-330" r="8"/>
      <circle cx="320" cy="-150" r="8"/>
      <circle cx="380" cy="120" r="8"/>
      <circle cx="-180" cy="320" r="8"/>
      <circle cx="-380" cy="-30" r="8"/>
      <circle cx="-320" cy="-220" r="8"/>
    </g>
    <g fill="#c66bff">
      <circle cx="120" cy="-330" r="2.5"/>
      <circle cx="320" cy="-150" r="2.5"/>
      <circle cx="380" cy="120" r="2.5"/>
      <circle cx="-180" cy="320" r="2.5"/>
      <circle cx="-380" cy="-30" r="2.5"/>
      <circle cx="-320" cy="-220" r="2.5"/>
    </g>

    <!-- pulse on the central node -->
    <circle r="22" fill="none" stroke="#5cf2ff" stroke-width="1.5" opacity="0.6">
      <animate attributeName="r" values="22;90;22" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0;0.7" dur="3.2s" repeatCount="indefinite"/>
    </circle>

    <!-- node labels -->
    <g font-size="11" fill="#9fc3ff" letter-spacing="2" opacity="0.85">
      <text x="-180" y="-130" text-anchor="middle">ALICE</text>
      <text x="170" y="-150" text-anchor="middle">BILLING-SVC</text>
      <text x="200" y="40" text-anchor="middle">RUNBOOK</text>
      <text x="-110" y="200" text-anchor="middle">SLA</text>
      <text x="40" y="-240" text-anchor="middle">POLICY</text>
      <text x="-220" y="0" text-anchor="middle">TEAM</text>
    </g>
  </g>

  <!-- Left side: wordmark and tagline -->
  <g transform="translate(120,360)">
    <text font-size="22" letter-spacing="9" fill="#5cf2ff" opacity="0.85">COMPANY · BRAIN</text>
    <text y="140" font-size="156" font-weight="800" letter-spacing="-3" fill="#f4f6ff">BrainOS</text>
    <text y="180" font-size="22" letter-spacing="6" fill="url(#accent)" font-weight="600">/  the missing layer for AI agents</text>

    <g transform="translate(0,260)" font-size="20" fill="#cfd6ea" opacity="0.85">
      <text>Hybrid RAG over atomic knowledge units +</text>
      <text y="32">a verifier loop that strips unsupported claims.</text>
      <text y="64">Exports SKILLS.md — every AI agent reads the</text>
      <text y="96">same map of how a company actually works.</text>
    </g>
  </g>

  <!-- Pipeline strip across the bottom -->
  <g transform="translate(120,840)">
    <g font-size="13" letter-spacing="6" fill="#7aa2ff">
      <text>PIPELINE</text>
    </g>
    <g transform="translate(0,30)">
      <!-- five pipeline pills -->
      <g font-size="16" font-weight="700" letter-spacing="2">
        <g>
          <rect x="0" y="0" width="190" height="56" rx="6" fill="#0d1830" stroke="#5cf2ff" stroke-width="1.4"/>
          <text x="95" y="36" text-anchor="middle" fill="#5cf2ff">INGEST</text>
        </g>
        <g transform="translate(220,0)">
          <rect x="0" y="0" width="190" height="56" rx="6" fill="#0d1830" stroke="#7aa2ff" stroke-width="1.4"/>
          <text x="95" y="36" text-anchor="middle" fill="#9fc3ff">EXTRACT</text>
        </g>
        <g transform="translate(440,0)">
          <rect x="0" y="0" width="220" height="56" rx="6" fill="#0d1830" stroke="#a07cff" stroke-width="1.4"/>
          <text x="110" y="36" text-anchor="middle" fill="#c4b3ff">RECONCILE</text>
        </g>
        <g transform="translate(690,0)">
          <rect x="0" y="0" width="190" height="56" rx="6" fill="#0d1830" stroke="#c66bff" stroke-width="1.4"/>
          <text x="95" y="36" text-anchor="middle" fill="#dfa9ff">ANSWER</text>
        </g>
        <g transform="translate(910,0)">
          <rect x="0" y="0" width="220" height="56" rx="6" fill="#0d1830" stroke="url(#amdRed)" stroke-width="1.4"/>
          <text x="110" y="36" text-anchor="middle" fill="#ff9b7a">SKILLS.md</text>
        </g>
      </g>
      <!-- arrows -->
      <g stroke="#5cf2ff" stroke-width="1.5" fill="#5cf2ff" opacity="0.7">
        <line x1="195" y1="28" x2="215" y2="28"/>
        <polygon points="220,28 213,24 213,32"/>
        <line x1="415" y1="28" x2="435" y2="28"/>
        <polygon points="440,28 433,24 433,32"/>
        <line x1="665" y1="28" x2="685" y2="28"/>
        <polygon points="690,28 683,24 683,32"/>
        <line x1="885" y1="28" x2="905" y2="28"/>
        <polygon points="910,28 903,24 903,32"/>
      </g>
    </g>
  </g>

  <!-- Bottom-right hardware badge -->
  <g transform="translate(1660,930)">
    <rect x="-180" y="0" width="200" height="78" rx="10" fill="#0d1320" stroke="url(#amdRed)" stroke-width="1.4"/>
    <text x="-160" y="28" font-size="11" letter-spacing="4" fill="#ff7a3b">POWERED BY</text>
    <text x="-160" y="56" font-size="22" font-weight="800" letter-spacing="2" fill="#ffe8d8">AMD MI300X</text>
  </g>

  <!-- Tiny code/metric ticker across the very bottom -->
  <g font-size="11" letter-spacing="3" fill="#7aa2ff" opacity="0.6">
    <text x="80" y="1020">// extracted_units=842   entities=126   tokens/s≈74   p50_latency=4.6s   verifier=on</text>
  </g>
</svg>
